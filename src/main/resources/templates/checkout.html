<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('お支払い - GMO-PG 決済デモ')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">お支払い</h4>
                </div>
                <div class="card-body">
                    <!-- 商品情報 -->
                    <div class="mb-4 p-3 bg-light rounded">
                        <h5 th:text="${product.name}">商品名</h5>
                        <p class="mb-0">
                            お支払い金額:
                            <strong class="text-primary fs-4"
                                    th:text="'¥' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">¥0</strong>
                        </p>
                    </div>

                    <!-- エラーメッセージ -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <!-- カード情報入力フォーム -->
                    <form id="payment-form" th:action="@{/payment/authorize}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input type="hidden" id="token-input" name="token" value="">

                        <div class="mb-3">
                            <label for="cardNo" class="form-label">カード番号</label>
                            <input type="text" class="form-control" id="cardNo"
                                   placeholder="4111111111111111" maxlength="16" required
                                   autocomplete="cc-number">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="expireMonth" class="form-label">有効期限（月）</label>
                                <select class="form-select" id="expireMonth" required>
                                    <option value="">月を選択</option>
                                    <option th:each="m : ${#numbers.sequence(1,12)}"
                                            th:value="${#strings.length(m) == 1 ? '0' + m : m}"
                                            th:text="${#strings.length(m) == 1 ? '0' + m : m}">01</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="expireYear" class="form-label">有効期限（年）</label>
                                <select class="form-select" id="expireYear" required>
                                    <option value="">年を選択</option>
                                    <option th:each="y : ${#numbers.sequence(26,35)}"
                                            th:value="${y}"
                                            th:text="${'20' + y}">2026</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="securityCode" class="form-label">セキュリティコード</label>
                            <input type="text" class="form-control" id="securityCode"
                                   placeholder="123" maxlength="4" style="width: 120px;" required
                                   autocomplete="cc-csc">
                        </div>

                        <div id="error-message" class="alert alert-danger d-none"></div>

                        <button type="submit" id="submit-btn" class="btn btn-primary btn-lg w-100">
                            お支払いを確定する
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- GMO-PG token.js -->
<script th:src="${tokenJsUrl}"></script>
<script th:inline="javascript">
    const shopId = /*[[${shopId}]]*/ '';

    Multipayment.init(shopId);

    document.getElementById('payment-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');
        errorMsg.classList.add('d-none');
        submitBtn.disabled = true;
        submitBtn.textContent = '処理中...';

        const cardNo = document.getElementById('cardNo').value;
        const expireYear = document.getElementById('expireYear').value;
        const expireMonth = document.getElementById('expireMonth').value;
        const securityCode = document.getElementById('securityCode').value;

        const expire = expireYear + expireMonth;

        Multipayment.getToken({
            cardno: cardNo,
            expire: expire,
            securitycode: securityCode,
            holdername: '',
            tokennumber: '1'
        }, function(response) {
            if (response.resultCode !== '000') {
                errorMsg.textContent = 'カード情報の検証に失敗しました。（エラーコード: ' + response.resultCode + '）';
                errorMsg.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.textContent = 'お支払いを確定する';
                return;
            }

            document.getElementById('token-input').value = response.tokenObject.token[0];
            document.getElementById('payment-form').submit();
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
