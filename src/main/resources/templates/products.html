<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('商品一覧 - GMO-PG 決済デモ')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2 class="mb-4">商品一覧</h2>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <img th:src="${product.imageUrl}" class="card-img-top" alt="商品画像"
                     style="height: 200px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.name}">商品名</h5>
                    <p class="card-text text-muted" th:text="${product.description}">商品説明</p>
                    <p class="card-text mt-auto">
                        <strong class="text-primary fs-4"
                                th:text="'¥' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">¥0</strong>
                    </p>
                    <a th:href="@{/checkout/{id}(id=${product.id})}" class="btn btn-primary mt-2">購入する</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
