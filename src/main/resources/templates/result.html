<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('決済結果 - GMO-PG 決済デモ')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- エラー表示 -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <h5 class="alert-heading">決済エラー</h5>
                <p th:text="${error}">エラーメッセージ</p>
            </div>

            <!-- 成功時の結果表示 -->
            <div th:if="${transaction}" class="card shadow">
                <div class="card-header"
                     th:classappend="${transaction.status.name() == 'AUTHORIZED'} ? 'bg-success text-white' : 'bg-danger text-white'">
                    <h4 class="mb-0" th:text="${transaction.status.name() == 'AUTHORIZED'} ? '決済が完了しました' : '決済に失敗しました'">結果</h4>
                </div>
                <div class="card-body">
                    <table class="table table-bordered">
                        <tr>
                            <th class="bg-light" style="width: 40%;">注文ID</th>
                            <td th:text="${transaction.orderId}">-</td>
                        </tr>
                        <tr>
                            <th class="bg-light">金額</th>
                            <td th:text="'¥' + ${#numbers.formatInteger(transaction.amount, 1, 'COMMA')}">¥0</td>
                        </tr>
                        <tr>
                            <th class="bg-light">ステータス</th>
                            <td>
                                <span class="badge status-badge"
                                      th:classappend="${transaction.status.name() == 'AUTHORIZED'} ? 'bg-success' : 'bg-danger'"
                                      th:text="${transaction.status}">STATUS</span>
                            </td>
                        </tr>
                        <tr th:if="${transaction.approve}">
                            <th class="bg-light">承認番号</th>
                            <td th:text="${transaction.approve}">-</td>
                        </tr>
                        <tr th:if="${transaction.tranId}">
                            <th class="bg-light">取引ID</th>
                            <td th:text="${transaction.tranId}">-</td>
                        </tr>
                    </table>

                    <div class="mt-3 d-flex gap-2">
                        <a href="/" class="btn btn-outline-primary">商品一覧に戻る</a>
                        <a href="/admin" class="btn btn-outline-secondary">管理画面へ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
